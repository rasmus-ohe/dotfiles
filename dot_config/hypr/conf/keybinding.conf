###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$mainModShift = $mainMod SHIFT
$mainModCtrl = $mainMod CTRL
$mainModAlt = $mainMod ALT
$mainModAltShift = $mainMod ALT SHIFT
$mainModCtrlShift = $mainMod CTRL SHIFT
$mainModCtrlAlt = $mainMod CTRL ALT

$newTerminal = footclient -e
$newTerminalHold = footclient -e --hold
$specialExec = hyprctl dispatch exec "[workspace special] foot -e" 

# Keyboard shortcuts: https://wiki.hyprland.org/Configuring/Binds/
bind = , XF86Calculator, exec, $calculator
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/hypr-blank.sh && notify-send "Escaped"  # Moves all monitors to a blank screen
bind = $mainModCtrl, A, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -l pavucontrol -c org.pulseaudio.pavucontrol -p 'Volume Control' -i 󰕾  # Audio (device) control (change input/output device)
bind = $mainMod, B, exec, $browser  # zen
bind = $mainModAlt, B, exec, blender  # Blender
bind = $mainModCtrl, B, exec, ~/.config/hypr/scripts/bt-connect-menu.sh  # BT Connection menu
bind = $mainModShift, B, exec, $browser_private  # zen (private window)
bind = $mainModCtrlAlt, B, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -l blueman-manager -p 'Bluetooth manager' -i 󰂯
bind = $mainModCtrlShift, B, exec, ~/.config/hypr/scripts/toggle-bluetooth.sh  # Toggle Bluetooth
bind = $mainMod, C, exec, code  # VSCode
bind = $mainModAlt, C, movecursortocorner, 1  # Move cursor to corner (1: bottom right)
bind = $mainModCtrl, C, exec, swaync-client -C  # Close all notifications
bind = $mainModShift, C, exec, cliphist list | fuzzel --dmenu | cliphist decode | wl-copy # Clipboard view
bind = $mainMod, D, exec, $menu  # fuzzel
bind = $mainModShift, D, exec, ~/.config/hypr/scripts/list-open-apps.sh # List open software in fuzzel
bind = $mainModAlt, D, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -l $discord -c 'discord' -i 󰙯  # Discord
bind = $mainMod, E, exec,  ~/.config/hypr/scripts/jump-or-launch-app.sh -l betterbird -c eu.betterbird.Betterbird -p "Betterbird" -i 󰇮  # Email client
bind = $mainModShift, E, exec, ~/.config/hypr/scripts/emoji-picker.sh copy  # Emoji picker
bind = $mainMod, F, exec, $fileManager
bind = $mainModAlt, F, exec, $newTerminal yazi  # Terminal file manager (yazi)
bind = $mainModShift, F, exec, $newTerminal fzf -e  # Fuzzy search
bind = $mainModCtrl, F, togglefloating,
bind = $mainMod, H, pseudo, # Window "hover"-mode
bind = $mainMod, I, exec, $settings  # Settings (nvim)
bind = $mainModAlt, I, exec, code ~/.config/hypr/  # Settings (code)
bind = $mainMod, J, layoutmsg, togglesplit  # Toggles the split (top/side)
bind = $mainModCtrl, J, layoutmsg, swapsplit  # Swaps the two halves of the split 
bind = $mainMod, L, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -l 'net.corluma.Corluma' -c 'corluma' -i 󰌵  # Control HUE lights
bind = $mainModAlt, L, exec, notify-send "Lenny" && $browser_lenny  # Lenny picker in web browser
bind = $mainModShift, L, exec, /home/rasmus/.config/hypr/scripts/lenny-picker.sh  # Lenny picker (fuzzel) 
bind = $mainMod, M, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -l 'spotify' -c 'Spotify' -i 󰓇  # Spotify
bind = $mainModCtrl, M, exec, toggle-mic-mute  # Toggle (default) mic mute status
bind = $mainModShift, M, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -c BeeperTexts -l beeper -p Beeper -i "󰍡"  # Beeper (messaging app)
bind = $mainModCtrlShift, M, exec, ~/.config/hypr/scripts/toggle-mouse-hold.sh
bind = $mainMod, N, exec, ~/.config/hypr/scripts/jump-or-launch-app.sh -l obsidian -i 󰎞
bind = $mainModCtrl, N, exec, swaync-client -t  # Toggle the notification panel
bind = $mainMod, O, exec, notify-send -t 4000 -h string:synchronous:date_time "󰥔 Current Time" "$(date '+%H:%M:%S - %A - %d/%m/%Y')"
bind = $mainModShift, O, exec, ~/.config/hypr/scripts/battery-status-notify.sh  # Battery of laptop battery
bind = $mainModAltShift, O, exec, ~/.config/hypr/scripts/device-battery-status.sh  # Battery of all devices
bind = $mainModShift, P, exec, ~/.config/hypr/scripts/ratbag-profile-switcher.sh  # Change Logitech mouse profile
bind = $mainMod, Q, killactive,  # Kill active window
bind = $mainModShift, Q, forcekillactive,  # Kill all similiar windows to the active
bind = $mainModCtrlShift, R, exec, hyprctl reload  # Reload Hyprland
bind = $mainMod, S, exec, $specialExec btop  # System monitor
bind = $mainModAlt, S, togglespecialworkspace
bind = $mainModShift, S, exec, $newTerminal ncdu  # Disk usage analyzer
bind = $mainMod, T, exec, footclient  # Terminal
bind = $mainModShift, T, exec, $fileManager trash://  # Trash
bind = $mainMod, U, exec, $specialExec "script -q -f /tmp/system-update-$(date +%Y%m%d-%H%M%S).log -c ~/.config/hypr/scripts/system-update.sh >/dev/null 2>&1"  # Update system
bind = $mainModAlt, U, exec, $specialExec "script -q -f /tmp/system-alt-update-$(date +%Y%m%d-%H%M%S).log -c ~/.config/hypr/scripts/system-alt-update.sh"  # Other system updates
bind = $mainModCtrl, V, exec, ~/.config/hypr/scripts/vpn-menu.sh  # Fuzzel VPN menu
bind = $mainMod, W, exec, ~/.config/hypr/scripts/go-to-last-used-workspace.sh  # Go to last used app
bind = $mainModCtrl, W, exec, notify-send -h string:synchronous:workspace "󰍹 Workspace: $(hyprctl monitors -j | jq -r '.[] | select(.focused == true) | if .specialWorkspace.id == -99 then "Special" else .activeWorkspace.id end')"  # Notify the current workspace id
bind = $mainModShift, W, exec, ~/.config/hypr/scripts/list-last-used-apps.sh  # List last used apps in fuzzel
bind = $mainModCtrlShift, W, exec, ~/.config/hypr/scripts/hold-key.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move selected window (or group) with arrow keys
bind = $mainModShift, left, movewindoworgroup, l
bind = $mainModShift, right, movewindoworgroup, r
bind = $mainModShift, up, movewindoworgroup, u
bind = $mainModShift, down, movewindoworgroup, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainModShift, 1, movetoworkspace, 1
bind = $mainModShift, 2, movetoworkspace, 2
bind = $mainModShift, 3, movetoworkspace, 3 
bind = $mainModShift, 4, movetoworkspace, 4
bind = $mainModShift, 5, movetoworkspace, 5
bind = $mainModShift, 6, movetoworkspace, 6
bind = $mainModShift, 7, movetoworkspace, 7
bind = $mainModShift, 8, movetoworkspace, 8
bind = $mainModShift, 9, movetoworkspace, 9
bind = $mainModShift, 0, movetoworkspace, 10

# Move whole workspace to another
bind = $mainModCtrlShift, 1, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 1
bind = $mainModCtrlShift, 2, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 2
bind = $mainModCtrlShift, 3, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 3
bind = $mainModCtrlShift, 4, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 4
bind = $mainModCtrlShift, 5, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 5
bind = $mainModCtrlShift, 6, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 6
bind = $mainModCtrlShift, 7, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 7
bind = $mainModCtrlShift, 8, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 8
bind = $mainModCtrlShift, 9, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 9
bind = $mainModCtrlShift, 0, exec, ~/.config/hypr/scripts/move-workspace-to-workspace.sh 10

# Groups
bind = $mainMod, g, togglegroup
bind = $mainModShift, g, changegroupactive, f
bind = $mainModCtrl, g, lockactivegroup, toggle

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize windows with arrow keys
binde = $mainModCtrl, left, resizeactive, -30 0
binde = $mainModCtrl, right, resizeactive, 30 0
binde = $mainModCtrl, up, resizeactive, 0 -30
binde = $mainModCtrl, down, resizeactive, 0 30

# Airplane mode notification
bind = , XF86RFKill, exec, airplane-mode-notify

# Power
bind = CTRL ALT SHIFT, F2, exec, playerctl -a pause &> /dev/null && systemctl suspend && hyprlock --no-fade-in -q # suspend
bind = CTRL ALT SHIFT, F3, exec, systemctl reboot  # reboot
bind = CTRL ALT SHIFT, F4, exec, systemctl poweroff  # poweroff

# Toggle touchpad
bind = $mainModCtrl, T, exec, toggle-touchpad


################
### Hyprland ###
################
$screenshot_dir = ~/Pictures/Screenshots
bind = , PRINT, exec, hyprshot -z -m region -m active -m window -o $screenshot_dir -f "$(date +'%Y_%m_%d_%H%M%S')_hyprshot_window.png"  # Screenshot the active window
bind = CTRL, PRINT, exec, hyprshot -m region -z -o $screenshot_dir -f "$(date +'%Y_%m_%d_%H%M%S')_hyprshot_region.png"  # Screenshot selected area
bind = $mainMod, PRINT, exec, hyprshot -m output -z -o $screenshot_dir -f "$(date +'%Y_%m_%d_%H%M%S')_hyprshot_monitor.png"  # Screenshot whole monitor
bind = $mainMod, TAB, hyprexpo:expo, toggle  # Hyprspace
bind = $mainModCtrl, S, exec, toggle-hyprshade  # Toggle hyprshade
bind = $mainModCtrlAlt, S, exec, hyprshade on grayscale # Enable grayscale filter
bind = $mainMod, Z, exec, hypr-zoom -easing=OutQuart -easingOut=OutQuart -duration=200 -steps=50 -interp=log  # Zoom tool 
bind = $mainMod, P, exec, hyprpicker -a -q && notify-send "Color copied to clipboard"


##################
### Brightness ###
##################
## Brightness: Notifications
$brightness_notify = awk \
        -v cur="$(brightnessctl get)" \
        -v max="$(brightnessctl max)" \
        'BEGIN { printf("%.0f\n", cur/max*100) }' | \
        xargs -I{} notify-send \
        -h int:value:{} \
        -h string:synchronous:volume \
        "󰍹 Brightness: {}%"
## Brigtness: Control
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ && $brightness_notify
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && $brightness_notify
binde = SHIFT, XF86MonBrightnessUp, exec, brightnessctl set 30%+ && $brightness_notify
binde = SHIFT, XF86MonBrightnessDown, exec, brightnessctl set 30%- && $brightness_notify
binde = CTRL, XF86MonBrightnessUp, exec, brightnessctl set 2%+ && $brightness_notify
binde = CTRL, XF86MonBrightnessDown, exec, brightnessctl set 2%- && $brightness_notify


#####################
### Media control ###
#####################
# Volume: Notifications
$volume_notify = wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print $2*100}' | xargs -I{} notify-send -t 1000 -h int:value:{} -h string:synchronous:volume "󰕾 Volume: {}%"
$media_mute_notify = pactl get-sink-mute @DEFAULT_SINK@ | grep -q 'yes' && notify-send -t 2000 -h string:synchronous:volume "󰝟 Muted" || notify-send -t 2000 -h string:synchronous:volume "󰕾 Unmuted"
$mic_mute_notify = pactl get-source-mute @DEFAULT_SOURCE@ | grep -q 'yes' && notify-send -t 2000 -h string:synchronous:mic-mute "󰍭 Muted" || notify-send -t 2000 -h string:synchronous:mic-mute "󰍬 Unmuted"
## Volume
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ && $volume_notify
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- && $volume_notify
binde = SHIFT, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+ && $volume_notify
binde = SHIFT, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%- && $volume_notify
binde = CTRL, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 0.25%+ && $volume_notify
binde = CTRL, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.25%- && $volume_notify
binde = $mainModAlt, up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+ && $volume_notify
binde = $mainModAlt, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- && $volume_notify
## Mute media
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $media_mute_notify
bindl = $mainModCtrlShift, O, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $media_mute_notify
## Mute mic
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && $mic_mute_notify
bindl = $mainModCtrl, M, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && $mic_mute_notify

## Play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bind = ALT, SPACE, exec, playerctl play-pause
bind = CTRL ALT, P, exec, playerctl -a pause
bind = CTRL ALT, SPACE, exec, ~/.config/hypr/scripts/toggle-selected-player.sh
##  Previous-Next
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bind = $mainModAlt, right, exec, playerctl next
bind = $mainModAlt, left, exec, playerctl previous
## Position
bind = $mainMod, PERIOD, exec, playerctl position 5+
bind = $mainMod, COMMA, exec, playerctl position 5-
bind = $mainModShift, PERIOD, exec, playerctl position 30+
bind = $mainModShift, COMMA, exec, playerctl position 30-
## Change input/output audio device
bind = $mainModCtrl, O, exec, ~/.config/hypr/scripts/change-audio-output.sh
bind = $mainModCtrl, I, exec, ~/.config/hypr/scripts/change-audio-input.sh

######################
### CLAMSHELL MODE ###
######################
bind = $mainModCtrl SHIFT, E, exec, clamshell open  # Enable the main display
bind = $mainModCtrl SHIFT, D, exec, clamshell closed  # Disable the main display
bindl = , switch:off:Lid Switch, exec, clamshell open
bindl = , switch:on:Lid Switch, exec, clamshell closed


########################
### TRACKPAD GESTURE ###
########################
gesture = 3, horizontal, workspace
